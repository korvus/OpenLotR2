# Override DOSBox pour pilotage par le MCP lotr2.
# Passe APRES le dosbox.conf embarque (les proprietes ci-dessous gagnent).
# But : fenetre (pas plein ecran) + sortie capturable par PrintWindow + demarrage
# direct du jeu SANS le "pause" du wrapper GamesNostalgia.

[sdl]
fullscreen=false
# surface = le mode le plus fiable pour la capture PrintWindow (overlay/opengl -> noir).
output=surface
windowresolution=original
# autolock=false : la souris N'EST PAS capturee au clic -> on reste en position
# absolue, indispensable pour que SetCursorPos corresponde au curseur du jeu.
autolock=false

[render]
# x2 pour des captures nettes et lisibles.
scaler=normal2x

[cpu]
core=dynamic
cycles=28000

[autoexec]
@echo off
mount C "D:\sites\lordOfTheRealms\lordsoftherealm2_dos_win\Lords of the Realm 2\lotr2"
c:
L2D.EXE
