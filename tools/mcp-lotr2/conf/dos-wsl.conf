# Conf DOSBox pour le backend WSL ISOLÉ (Xvfb + xdotool).
# Le jeu tourne sur un display X virtuel invisible : l'input (xdotool) ne
# touche jamais la vraie souris/clavier de l'utilisateur. Voir
# tools/mcp-lotr2/wsl-lotr2.sh et la mémoire [[mcp-lotr2-isolation]].

[sdl]
fullscreen=false
# surface = rendu logiciel, capturable par `import`/`scrot` sur Xvfb.
output=surface
# autolock=false : la souris n'est jamais "grabbée" → xdotool reste en
# coordonnées absolues fenêtre, indispensable pour le mapping des clics.
autolock=false

[mixer]
# nosound=true : le son est toujours ÉMULÉ (timing du jeu préservé) mais aucun
# échantillon n'est joué → équivaut à un volume à 0. Évite aussi les erreurs
# d'ouverture de périphérique audio sous Xvfb (pas de carte son dans le container).
nosound=true

[render]
# x2 → fenêtre 640×480 (mode jeu 320×240), captures nettes alignées sur les
# coordonnées CLIENT envoyées par le MCP.
scaler=normal2x

[cpu]
core=dynamic
cycles=28000

[autoexec]
@echo off
mount C "/mnt/d/sites/lordOfTheRealms/lordsoftherealm2_dos_win/Lords of the Realm 2/lotr2"
c:
L2D.EXE
